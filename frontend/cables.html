<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cables - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0a0e1a' : '#f4f7fe');
    })();
  </script>
</head>
<body class="preloading">

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:white"><path d="M1 6l5.5 5.5L12 6l5.5 5.5L23 6"/><path d="M1 12l5.5 5.5L12 12l5.5 5.5L23 12"/></svg>
      </div>
      <div class="logo-text">
        <h1>CoreNMS</h1>
        <div>Unified Portal</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium); font-weight:800">Cable Management</h2>
        <p style="font-size:12px; color:var(--text-muted)">Monitor and manage network cabling nodes</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>
          Tambah Kabel
        </button>
      </div>
    </header>

    <div class="page-body">
      <div id="cable-list" class="card" style="padding: 0; overflow: hidden;">
        <table>
          <thead>
            <tr>
              <th>Nama Kabel</th>
              <th>Jenis</th>
              <th>Cores</th>
              <th>Tubes</th>
              <th>Keterangan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="cable-table-body">
            <tr><td colspan="6" style="text-align:center; padding:40px">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add Cable -->
<div id="modal-cable" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Tambah Kabel Baru</h3>
      <button class="btn-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="form-cable" onsubmit="saveCable(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nama Kabel</label>
          <input type="text" id="cable-name" class="form-control" placeholder="Contoh: Backbone JKT-BOG" required>
        </div>
        <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Total Core</label>
            <input type="number" id="cable-cores" class="form-control" value="24">
          </div>
          <div class="form-group">
            <label class="form-label">Total Tube</label>
            <input type="number" id="cable-tubes" class="form-control" value="2">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Jenis Kabel</label>
          <select id="cable-type" class="form-control">
            <option value="">-- Pilih Jenis --</option>
            <option value="ADSS">ADSS</option>
            <option value="Duct">Duct</option>
            <option value="Resin">Resin</option>
            <option value="Drop Core">Drop Core</option>
            <option value="Aerial">Aerial</option>
            <option value="Underground">Underground</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Keterangan</label>
          <textarea id="cable-desc" class="form-control" style="height:80px"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan Kabel</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('cables.html');

  const modal = document.getElementById('modal-cable');
  const form = document.getElementById('form-cable');
  let editingId = null;

  async function loadCables() {
    const tbody = document.getElementById('cable-table-body');
    try {
      console.log('Fetching cables...');
      const cables = await api.get('/kabel');
      console.log('Cables received:', cables);
      
      if (cables.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:60px 20px; color:var(--text-muted)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="margin-bottom:16px; opacity:0.3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <div style="font-weight:600; color:var(--text-primary)">Belum ada data kabel</div>
          <p style="font-size:13px">Klik tombol "Tambah Kabel" untuk memulai</p>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = cables.map(c => `
        <tr>
          <td style="font-weight:700">${c.nama_kabel}</td>
          <td><span class="badge" style="background:var(--bg-secondary); border:1px solid var(--border-color)">${c.jenis_kabel || '-'}</span></td>
          <td style="font-family:var(--font-premium); font-weight:700">${c.total_core} Core</td>
          <td>${c.total_tube} Tube</td>
          <td style="font-size:12px; color:var(--text-muted)">${c.keterangan || '-'}</td>
          <td>
            <div style="display:flex; gap:8px">
              <button class="btn btn-ghost" style="padding:6px" onclick="editCable(${c.id}, '${c.nama_kabel}', '${c.jenis_kabel}', ${c.total_core}, ${c.total_tube}, '${c.keterangan}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-ghost" style="padding:6px; color:var(--danger)" onclick="deleteCable(${c.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error('Fetch error:', err);
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--danger)">
        Error: ${err.message}. Pastikan server sudah direstart.
      </td></tr>`;
    }
  }

  function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Tambah Kabel Baru';
    form.reset();
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
  }

  function editCable(id, name, type, cores, tubes, desc) {
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Kabel';
    document.getElementById('cable-name').value = name;
    document.getElementById('cable-type').value = type !== 'null' ? type : '';
    document.getElementById('cable-cores').value = cores;
    document.getElementById('cable-tubes').value = tubes;
    document.getElementById('cable-desc').value = desc !== 'null' ? desc : '';
    modal.style.display = 'flex';
  }

  async function saveCable(e) {
    e.preventDefault();
    const data = {
      nama_kabel: document.getElementById('cable-name').value,
      total_core: parseInt(document.getElementById('cable-cores').value),
      total_tube: parseInt(document.getElementById('cable-tubes').value),
      jenis_kabel: document.getElementById('cable-type').value,
      keterangan: document.getElementById('cable-desc').value
    };

    try {
      if (editingId) {
        await api.put(`/kabel/${editingId}`, data);
      } else {
        await api.post('/kabel', data);
      }
      closeModal();
      loadCables();
    } catch (err) {
      alert(err.message);
    }
  }

  async function deleteCable(id) {
    if (!confirm('Hapus kabel ini?')) return;
    try {
      await api.delete(`/kabel/${id}`);
      loadCables();
    } catch (err) {
      alert(err.message);
    }
  }

  // Initial load
  loadCables();
</script>
</body>
</html>
