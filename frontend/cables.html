<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Master Kabel - CoreNMS">
  <title>Cables - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0d0f18' : '#f8fafc');
    })();
  </script>
</head>
<body class="preloading">

<div class="toast-container" id="toast-container"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-text"><h1>CoreNMS</h1><div>Fiber Management</div></div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium);font-weight:800;font-size:20px">Kabel Optik</h2>
        <p style="font-size:12px;color:var(--text-muted)">Manajemen Inventaris Master Kabel</p>
      </div>
      <div class="page-header-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Cari nama atau jenis..." onkeyup="filterTable()">
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
          Tambah Kabel
        </button>
      </div>
    </header>

    <div class="page-body" style="padding:20px">
      
      <!-- Cable Stats -->
      <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:24px">
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(99,102,241,0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <div>
               <div id="stat-total-cables" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Total Kabel</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(67, 97, 238, 0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div>
               <div id="stat-backbone" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Backbone/Feeder</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(34,197,94,0.1); color:var(--success); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div>
               <div id="stat-in-use" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">In Use (JC)</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(99,102,241,0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div>
               <div id="stat-total-cores" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Total Core</div>
            </div>
         </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border-radius:14px">
        <div style="padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01)">
           <h4 style="font-size:13px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Inventaris Kabel</h4>
           <button class="btn btn-ghost btn-sm" onclick="loadCables()">Refresh</button>
        </div>
        <div class="table-container">
          <table id="cable-table" style="width:100%">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>Nama & Keterangan</th>
                <th>Jenis</th>
                <th style="text-align:center">Kapasitas</th>
                <th style="text-align:center">Utilisasi JC</th>
                <th style="text-align:right">Aksi</th>
              </tr>
            </thead>
            <tbody id="cable-table-body">
              <tr><td colspan="6" style="text-align:center;padding:60px">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add/Edit Cable -->
<div id="modal-cable" class="modal-overlay">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="modal-title">Data Kabel</h3>
      <button class="btn-close" onclick="closeModal()"></button>
    </div>
    <form id="form-cable" onsubmit="saveCable(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Nama Kabel</label>
          <input type="text" id="cable-name" class="form-control" placeholder="Contoh: Backbone JKT-BOG" required>
        </div>
        <div class="form-group">
          <label class="form-label">Jenis Kabel</label>
          <select id="cable-type" class="form-control">
            <option value="ADSS">ADSS</option>
            <option value="MINI ADSS">MINI ADSS</option>
            <option value="FIG-8">FIG-8</option>
            <option value="DROP CORE">DROP CORE</option>
            <option value="LOOSE TUBE">LOOSE TUBE</option>
          </select>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Total Core</label>
            <select id="cable-cores" class="form-control" onchange="updateTubeOptions()">
              <option value="4">4 Core</option>
              <option value="6">6 Core</option>
              <option value="12">12 Core</option>
              <option value="24" selected>24 Core</option>
              <option value="48">48 Core</option>
              <option value="96">96 Core</option>
              <option value="144">144 Core</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Total Tube</label>
            <select id="cable-tubes" class="form-control">
              <option value="1">1 Tube</option>
              <option value="2">2 Tube</option>
              <option value="4">4 Tube</option>
              <option value="6">6 Tube</option>
              <option value="8">8 Tube</option>
              <option value="12">12 Tube</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Keterangan</label>
          <textarea id="cable-desc" class="form-control" rows="2" placeholder="Detail tambahan..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary" id="btn-save-cable">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div id="modal-confirm" class="modal-overlay">
  <div class="modal" style="max-width:400px; text-align:center; padding:32px">
    <div class="modal-confirm-icon danger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="28" height="28"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
    <h4 style="font-size:18px; font-weight:800; margin-bottom:8px">Hapus Kabel?</h4>
    <p id="confirm-msg" style="font-size:13px; color:var(--text-muted); margin-bottom:24px; line-height:1.6"></p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
      <button class="btn btn-secondary" onclick="closeConfirm(false)">Batal</button>
      <button class="btn btn-danger" onclick="closeConfirm(true)">Hapus Kabel</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('cables.html');

  let allCables = [];
  let editingId = null;
  let confirmCallback = null;

  async function loadCables() {
    const tbody = document.getElementById('cable-table-body');
    try {
      allCables = await api.get('/kabel');
      updateStats();
      
      if (!allCables.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <h4>Belum ada data kabel</h4><p>Klik tombol "Tambah Kabel" untuk mendaftarkan master kabel baru.</p>
        </div></td></tr>`;
        return;
      }

      tbody.innerHTML = allCables.map((c, i) => `
        <tr>
          <td style="color:var(--text-muted); font-size:11px">${i + 1}</td>
          <td>
            <div style="font-weight:800; color:var(--text-primary); font-size:14px">${c.nama_kabel}</div>
            <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase">${c.keterangan || '-'}</div>
          </td>
          <td><span class="tag badge-secondary" style="background:rgba(99,102,241,0.05)">${c.jenis_kabel || 'FO'}</span></td>
          <td style="text-align:center">
             <div style="font-weight:800; color:var(--accent)">${c.total_core} <span style="font-size:9px; color:var(--text-muted)">CORE</span></div>
             <div style="font-size:10px; color:var(--text-muted)">${c.total_tube} Tube</div>
          </td>
          <td style="text-align:center">
             <span class="tag ${c.jc_count > 0 ? 'badge-success' : 'badge-secondary'}">${c.jc_count || 0} JC Terpasang</span>
          </td>
          <td style="text-align:right">
            <div style="display:flex; justify-content:flex-end; gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="editCable(${c.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteCable(${c.id},'${c.nama_kabel}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--danger)">Gagal memuat data: ${err.message}</td></tr>`;
    }
  }

  function updateStats() {
    document.getElementById('stat-total-cables').textContent = allCables.length;
    document.getElementById('stat-backbone').textContent = allCables.filter(c => (c.total_core || 0) >= 24).length;
    document.getElementById('stat-in-use').textContent = allCables.filter(c => (c.jc_count || 0) > 0).length;
    document.getElementById('stat-total-cores').textContent = allCables.reduce((s, c) => s + (c.total_core || 0), 0);
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('#cable-table-body tr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  function updateTubeOptions() {
    const cores = parseInt(document.getElementById('cable-cores').value);
    const tubeSelect = document.getElementById('cable-tubes');
    // Basic logic for tube estimation
    if (cores <= 12) tubeSelect.value = "1";
    else tubeSelect.value = Math.ceil(cores / 12).toString();
  }

  function openModal() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Tambah Kabel';
    document.getElementById('form-cable').reset();
    document.getElementById('modal-cable').style.display = 'flex';
  }

  function editCable(id) {
    const c = allCables.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Kabel';
    document.getElementById('cable-name').value = c.nama_kabel;
    document.getElementById('cable-type').value = c.jenis_kabel || 'ADSS';
    document.getElementById('cable-cores').value = c.total_core;
    document.getElementById('cable-tubes').value = c.total_tube;
    document.getElementById('cable-desc').value = c.keterangan || '';
    document.getElementById('modal-cable').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-cable').style.display = 'none'; }

  async function saveCable(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-save-cable');
    btn.disabled = true;
    
    const data = {
      nama_kabel: document.getElementById('cable-name').value.trim(),
      jenis_kabel: document.getElementById('cable-type').value,
      total_core: parseInt(document.getElementById('cable-cores').value),
      total_tube: parseInt(document.getElementById('cable-tubes').value),
      keterangan: document.getElementById('cable-desc').value
    };

    try {
      if (editingId) await api.put(`/kabel/${editingId}`, data);
      else await api.post('/kabel', data);
      
      toast(editingId ? 'Data diperbarui' : 'Data ditambahkan');
      closeModal();
      loadCables();
    } catch (e) { toast(e.message, 'danger'); }
    finally { btn.disabled = false; }
  }

  function deleteCable(id, nama) {
    document.getElementById('confirm-msg').textContent = `Hapus kabel "${nama}"? Pastikan kabel sudah tidak terpasang di JC manapun.`;
    document.getElementById('modal-confirm').style.display = 'flex';
    confirmCallback = async (ok) => {
      if (ok) {
        try {
          await api.delete(`/kabel/${id}`);
          toast('Data dihapus', 'danger');
          loadCables();
        } catch (e) { toast(e.message, 'danger'); }
      }
    };
  }

  function closeConfirm(res) {
    document.getElementById('modal-confirm').style.display = 'none';
    if (confirmCallback) confirmCallback(res);
  }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  loadCables();
</script>
</body>
</html>
