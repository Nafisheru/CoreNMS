<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detail Joint Closure - CoreNMS">
  <title>JC Detail - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0d0f18' : '#f8fafc');
    })();
  </script>
  <style>
    /* ── Local Splicing Styles ── */
    .splicing-workspace {
      display: grid; 
      grid-template-columns: 300px 1fr 300px; 
      height: 100%; 
      position: relative;
      background: var(--bg-primary);
    }
    .core-column {
      display: flex; flex-direction: column;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      z-index: 10;
    }
    .core-column.right { border-right: none; border-left: 1px solid var(--border-color); }
    
    .panel-header {
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex; flex-direction: column; gap: 8px;
    }
    
    .core-list {
      flex: 1; overflow-y: auto; 
      padding: 8px 0;
    }

    .core-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      transition: all 0.2s;
    }
    .core-item:last-child { border-bottom: none; }
    
    .core-item.connected { background: rgba(34, 197, 94, 0.03); }
    .core-item.selected { background: rgba(99, 102, 241, 0.1) !important; border-left: 3px solid var(--accent); }

    .core-info { flex: 1; min-width: 0; }
    .core-name { font-size: 11px; font-weight: 800; color: var(--text-primary); text-transform: uppercase; }
    .core-sub { font-size: 9px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }

    /* SVG Overlay */
    #splice-svg {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 5;
    }
    
    /* Animation for SVG path */
    @keyframes dashMove { to { stroke-dashoffset: -20; } }
    .splice-line {
      fill: none; stroke: var(--accent); stroke-width: 2.5;
      stroke-dasharray: 6,4; animation: dashMove 1s linear infinite;
      filter: drop-shadow(0 0 3px var(--accent-glow));
      transition: opacity 0.3s;
    }
    .splice-line:hover { stroke-width: 4; opacity: 1; }

    /* Empty state */
    .visualizer-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); opacity: 0.15;
      pointer-events: none;
    }
  </style>
</head>
<body class="preloading">
  <div class="toast-container" id="toast-container"></div>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <header class="page-header">
      <div style="display:flex; align-items:center; gap:16px">
        <button class="btn btn-ghost" onclick="location.href='joint-closure.html'" style="padding:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div>
          <h2 id="jc-title" style="font-family:var(--font-premium); font-weight:800; font-size:18px">Loading...</h2>
          <div id="jc-meta" style="font-size:11px; color:var(--text-muted); display:flex; gap:12px; margin-top:2px"></div>
        </div>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-ghost btn-sm" onclick="loadJC()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="page-body">
      <div style="display:grid; grid-template-columns: 320px 1fr; gap:22px; align-items: start">
        
        <!-- Sidebar Info -->
        <div style="display:flex; flex-direction:column; gap:20px">
          
          <!-- Cables Card -->
          <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
              <span class="tag badge-secondary" style="font-size:9px">Kabel Terpasang</span>
              <button class="btn btn-primary btn-sm" onclick="openModal('modal-cable')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M12 5v14M5 12h14"/></svg>
                Tambah
              </button>
            </div>
            <div id="cable-list" style="display:flex; flex-direction:column; gap:8px"></div>
          </div>

          <!-- Stats Card -->
          <div class="card">
            <span class="tag badge-secondary" style="font-size:9px; margin-bottom:12px">Statistik JC</span>
            <div id="jc-stats" style="display:flex; flex-direction:column; gap:1px"></div>
          </div>

        </div>

        <!-- Trays & Management -->
        <div class="card" style="padding:0">
          <div style="padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center">
            <div style="display:flex; align-items:center; gap:10px">
               <div style="width:32px; height:32px; border-radius:8px; background:var(--accent-glow); display:flex; align-items:center; justify-content:center; color:var(--accent)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
               </div>
               <h4 style="font-size:14px; font-weight:700">Manajemen Tray</h4>
            </div>
            <button class="btn btn-primary" onclick="openModal('modal-tray')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
              Tambah Tray
            </button>
          </div>
          <div id="tray-list" style="padding:20px; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:16px"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- Modal: Hubungkan Kabel -->
  <div class="modal-overlay" id="modal-cable">
    <div class="modal">
      <div class="modal-header">
        <h3>Connect Cable</h3>
        <button class="btn-close" onclick="closeModal('modal-cable')"></button>
      </div>
      <form onsubmit="handleConnectCable(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Kabel Master</label>
            <select id="sel-cable-master" class="form-control" required></select>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
            <div class="form-group">
              <label class="form-label">Sisi Kabel</label>
              <select id="sel-cable-side" class="form-control">
                <option value="SISI A">SISI A</option>
                <option value="SISI B">SISI B</option>
                <option value="IN">IN</option>
                <option value="OUT">OUT</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Arah</label>
              <input type="text" id="inp-cable-direction" class="form-control" placeholder="Contoh: Ke ODP-X">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-cable')">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Tambah Tray -->
  <div class="modal-overlay" id="modal-tray">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h3>Tray Baru</h3>
        <button class="btn-close" onclick="closeModal('modal-tray')"></button>
      </div>
      <form onsubmit="handleSaveTray(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Nomor Tray</label>
            <input type="number" id="inp-tray-num" class="form-control" value="1" required>
          </div>
          <div class="form-group">
            <label class="form-label">Kapasitas (Core)</label>
            <select id="sel-tray-cap" class="form-control">
              <option value="12">12 Core</option>
              <option value="24" selected>24 Core</option>
              <option value="48">48 Core</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-tray')">Batal</button>
          <button type="submit" class="btn btn-primary">Tambah</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Modal: Splicing Technical Workspace ── -->
  <div class="modal-overlay" id="modal-splicing">
    <div class="modal" style="max-width:1200px; width:95%; height:90vh; display:flex; flex-direction:column; padding:0">
      <div class="modal-header glass-panel" style="border-radius:0; padding:12px 24px">
        <div style="display:flex; align-items:center; gap:16px">
          <div class="logo-icon" style="width:36px; height:36px">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div>
            <h3 id="splice-tray-title" style="font-size:14px; font-weight:800; color:var(--text-primary)">Splicing Workspace</h3>
            <p id="splice-tray-sub" style="font-size:10px; color:var(--text-muted); margin:0"></p>
          </div>
        </div>
        <div style="display:flex; gap:10px">
           <button class="btn btn-ghost btn-sm" onclick="exportSplices()">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
             Export
           </button>
           <button class="btn-close" onclick="closeModal('modal-splicing')"></button>
        </div>
      </div>

      <div class="splicing-workspace tech-grid-bg" id="splice-workspace">
        <svg id="splice-svg"></svg>
        
        <div class="visualizer-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="120" height="120"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          <div style="font-weight:700; font-size:14px; letter-spacing:2px; margin-top:20px">TECHNICAL VISUALIZER</div>
        </div>

        <!-- Left Panel: Input -->
        <div class="core-column">
          <div class="panel-header">
            <span class="tag badge-info" style="font-size:9px">INPUT / ORIGIN</span>
            <select id="sel-splice-source" class="form-control" style="font-size:11px; font-weight:700" onchange="renderCores('source')"></select>
            <div class="search-box" style="width:100%">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" placeholder="Cari core..." style="width:100%; font-size:11px; padding:6px 12px 6px 32px" oninput="filterCores('source', this.value)">
            </div>
          </div>
          <div id="list-source-cores" class="core-list no-scrollbar"></div>
        </div>

        <!-- Middle Spacer -->
        <div style="pointer-events:none"></div>

        <!-- Right Panel: Output -->
        <div class="core-column right">
          <div class="panel-header">
            <span class="tag badge-success" style="font-size:9px">OUTPUT / TARGET</span>
            <select id="sel-splice-target" class="form-control" style="font-size:11px; font-weight:700" onchange="renderCores('target')"></select>
            <div class="search-box" style="width:100%">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" placeholder="Cari core..." style="width:100%; font-size:11px; padding:6px 12px 6px 32px" oninput="filterCores('target', this.value)">
            </div>
          </div>
          <div id="list-target-cores" class="core-list no-scrollbar"></div>
        </div>
      </div>

      <div class="modal-footer glass-panel" style="border-radius:0; background:var(--bg-card); padding:10px 24px">
        <div style="display:flex; gap:20px; font-size:11px; font-weight:700; color:var(--text-muted)">
          <div style="display:flex; align-items:center; gap:8px"><div style="width:8px; height:8px; border-radius:50%; background:var(--accent)"></div> Connected</div>
          <div style="display:flex; align-items:center; gap:8px"><div style="width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.05); border:1px solid var(--border-color)"></div> Free</div>
        </div>
        <button class="btn btn-primary" style="padding:8px 30px" onclick="closeModal('modal-splicing')">Selesai</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const id = new URLSearchParams(window.location.search).get('id');
    let jcData = null;
    let traySplices = [];
    let currentTray = null;
    let selectedSource = null;
    
    const coreColors = ['#1e88e5','#ff9800','#4caf50','#795548','#9e9e9e','#ffffff','#f44336','#212121','#ffeb3b','#9c27b0','#e91e63','#00bcd4'];
    const colorNames = ['BIRU','ORANYE','HIJAU','COKELAT','ABU-ABU','PUTIH','MERAH','HITAM','KUNING','UNGU','PINK','TOSKA'];

    renderNav('joint-closure.html');

    async function loadJC() {
      if (!id) return (location.href = 'joint-closure.html');
      try {
        jcData = await api.get(`/joint-closure/${id}`);
        renderUI();
      } catch (e) {
        toast(e.message, 'danger');
      }
    }

    function renderUI() {
      // Header
      document.getElementById('jc-title').textContent = jcData.kode_jc;
      document.getElementById('jc-meta').innerHTML = `
        <span>📍 ${jcData.lokasi || 'Tanpa Lokasi'}</span>
        <span>📦 ${jcData.status_jc.toUpperCase()}</span>
        <span>🗓️ ${new Date(jcData.created_at).toLocaleDateString()}</span>
      `;

      // Stats
      const totalCores = (jcData.cables || []).reduce((s, c) => s + (c.total_core || 0), 0);
      const totalSplices = (jcData.trays || []).reduce((s, t) => s + (t.splice_count || 0), 0);
      
      document.getElementById('jc-stats').innerHTML = `
        <div class="info-row"><span class="label">Total Kabel</span><span class="value">${jcData.cables?.length || 0}</span></div>
        <div class="info-row"><span class="label">Total Tray</span><span class="value">${jcData.trays?.length || 0}</span></div>
        <div class="info-row"><span class="label">Total Core</span><span class="value">${totalCores}</span></div>
        <div class="info-row"><span class="label">Spliced</span><span class="value" style="color:var(--success)">${totalSplices}</span></div>
      `;

      // Cable List
      document.getElementById('cable-list').innerHTML = (jcData.cables || []).map(c => `
        <div class="glass-panel" style="padding:10px 14px; border-radius:10px; display:flex; justify-content:space-between; align-items:center">
          <div>
            <div style="font-size:12px; font-weight:800">${c.nama_kabel}</div>
            <div style="font-size:9px; color:var(--text-muted); text-transform:uppercase; margin-top:2px">${c.sisi_kabel} • ${c.arah_kabel || '-'}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px">
            <span class="tag badge-secondary" style="font-size:9px">${c.total_core} C</span>
            <button class="btn-icon-sm danger" onclick="disconnectCable(${c.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
      `).join('') || '<div class="empty-state">Belum ada kabel</div>';

      // Tray List
      document.getElementById('tray-list').innerHTML = (jcData.trays || []).map(t => `
        <div class="card core-item" style="padding:16px; display:flex; flex-direction:column; gap:14px">
           <div style="display:flex; justify-content:space-between; align-items:center">
              <div style="display:flex; align-items:center; gap:10px">
                 <div style="width:36px; height:36px; border-radius:10px; background:rgba(99,102,241,0.08); display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:800">
                   ${t.nomor_tray}
                 </div>
                 <div>
                    <div style="font-size:14px; font-weight:800">TRAY #${t.nomor_tray}</div>
                    <div style="font-size:10px; color:var(--text-muted)">${t.kapasitas_tray} Core • ${t.splice_count || 0} Terpakai</div>
                 </div>
              </div>
              <div style="display:flex; gap:6px">
                 <button class="btn btn-ghost btn-sm" onclick="deleteTray(${t.id})" style="color:var(--danger)">Hapus</button>
                 <button class="btn btn-primary btn-sm" onclick="openSplicing(${t.id})">Splicing</button>
              </div>
           </div>
        </div>
      `).join('') || '<div class="empty-state">Belum ada tray</div>';

      // Populate selects
      const cableOptions = '<option value="">-- Pilih Kabel --</option>' + 
        (jcData.cables || []).map(c => `<option value="${c.id}">${c.nama_kabel} (${c.sisi_kabel})</option>`).join('');
      document.getElementById('sel-splice-source').innerHTML = cableOptions;
      document.getElementById('sel-splice-target').innerHTML = cableOptions;
    }

    // Modal Handling
    function openModal(id) { 
      if (id === 'modal-cable') {
        api.get('/kabel').then(list => {
          document.getElementById('sel-cable-master').innerHTML = '<option value="">-- Pilih --</option>' +
            list.map(c => `<option value="${c.id}">${c.nama_kabel} (${c.total_core} C / ${c.jenis_kabel})</option>`).join('');
        });
      }
      document.getElementById(id).style.display = 'flex'; 
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; if(id==='modal-splicing') loadJC(); }

    async function handleConnectCable(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      try {
        await api.post('/joint-closure/connect-cable', {
          jc_id: parseInt(id),
          kabel_id: parseInt(document.getElementById('sel-cable-master').value),
          sisi_kabel: document.getElementById('sel-cable-side').value,
          arah_kabel: document.getElementById('inp-cable-direction').value
        });
        closeModal('modal-cable');
        loadJC();
        toast('Kabel berhasil dihubungkan');
      } catch (e) { toast(e.message, 'danger'); }
      finally { btn.disabled = false; }
    }

    async function handleSaveTray(e) {
      e.preventDefault();
      try {
        await api.post('/joint-closure/trays', {
          jc_id: parseInt(id),
          nomor_tray: parseInt(document.getElementById('inp-tray-num').value),
          kapasitas_tray: parseInt(document.getElementById('sel-tray-cap').value)
        });
        closeModal('modal-tray');
        loadJC();
        toast('Tray ditambahkan');
      } catch (e) { toast(e.message, 'danger'); }
    }

    async function deleteTray(trayId) {
      if (!confirm('Hapus tray ini? Semua data splicing akan hilang.')) return;
      try {
        await api.delete(`/joint-closure/trays/${trayId}`);
        loadJC();
        toast('Tray dihapus');
      } catch (e) { toast(e.message, 'danger'); }
    }

    async function disconnectCable(relId) {
      if (!confirm('Putuskan koneksi kabel ini?')) return;
      try {
        await api.delete(`/joint-closure/disconnect-cable/${relId}`);
        loadJC();
        toast('Kabel diputus');
      } catch (e) { toast(e.message, 'danger'); }
    }

    // ── Splicing Workspace Logic ──

    async function openSplicing(trayId) {
      currentTray = jcData.trays.find(t => t.id === trayId);
      document.getElementById('splice-tray-title').textContent = `Tray #${currentTray.nomor_tray} Workspace`;
      document.getElementById('splice-tray-sub').textContent = `${currentTray.kapasitas_tray} Core Kapasitas • ${jcData.kode_jc}`;
      
      try {
        traySplices = await api.get(`/joint-closure/trays/${trayId}/splices`);
        
        // Smart Selection: Find first IN/A cable for source, OUT/B for target
        const src = jcData.cables.find(c => c.sisi_kabel.includes('A') || c.sisi_kabel.includes('IN')) || jcData.cables[0];
        const tgt = jcData.cables.find(c => (c.sisi_kabel.includes('B') || c.sisi_kabel.includes('OUT')) && c.id !== src?.id) || jcData.cables[1] || jcData.cables[0];
        
        if (src) document.getElementById('sel-splice-source').value = src.id;
        if (tgt) document.getElementById('sel-splice-target').value = tgt.id;
        
        renderCores('source');
        renderCores('target');
        
        document.getElementById('modal-splicing').style.display = 'flex';
        
        // Wait for modal animation and DOM to settle
        setTimeout(() => {
          drawSplices();
          initResizeObserver();
        }, 400);
      } catch (e) { toast(e.message, 'danger'); }
    }

    function renderCores(side) {
      const cableId = document.getElementById(`sel-splice-${side}`).value;
      const list = document.getElementById(`list-${side}-cores`);
      const cable = jcData.cables.find(c => c.id == cableId);
      
      if (!cable) { list.innerHTML = ''; return; }
      
      list.innerHTML = Array.from({length: cable.total_core}).map((_, i) => {
        const num = i + 1;
        const color = coreColors[i % 12];
        const conn = traySplices.find(s => 
          (side === 'source' && s.source_kabel_id == cableId && s.source_core == num) ||
          (side === 'target' && s.target_kabel_id == cableId && s.target_core == num)
        );
        const isSelected = selectedSource && side === 'source' && selectedSource.cableId == cableId && selectedSource.num == num;

        return `
          <div class="core-item ${conn ? 'connected' : ''} ${isSelected ? 'selected' : ''}" 
               data-id="${num}" data-cable="${cableId}" onclick="clickCore('${side}', ${cableId}, ${num})">
            <div class="core-node" style="background:${color}; color:${['#ffffff','#ffeb3b','#9e9e9e'].includes(color) ? '#000' : '#fff'}">${num}</div>
            <div class="core-info">
              <div class="core-name">${colorNames[i % 12]}</div>
              <div class="core-sub">Core ${num} ${conn ? '• <span style="color:var(--success)">SPLICED</span>' : ''}</div>
            </div>
            ${conn ? `<button class="btn-icon-sm danger" style="padding:4px" onclick="deleteSplice(event, ${conn.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>` : ''}
          </div>
        `;
      }).join('');
      requestAnimationFrame(drawSplices);
    }

    function clickCore(side, cableId, num) {
      if (side === 'source') {
        const conn = traySplices.find(s => s.source_kabel_id == cableId && s.source_core == num);
        if (conn) return toast('Core ini sudah terpakai', 'warning');
        selectedSource = { cableId, num };
        renderCores('source');
      } else {
        if (!selectedSource) return toast('Pilih core asal (INPUT) dulu', 'warning');
        const conn = traySplices.find(s => s.target_kabel_id == cableId && s.target_core == num);
        if (conn) return toast('Core target sudah terpakai', 'warning');
        
        saveSplice(selectedSource, { cableId, num });
        selectedSource = null;
      }
    }

    async function saveSplice(src, tgt) {
      try {
        const res = await api.post('/joint-closure/splices', {
          tray_id: currentTray.id,
          source_kabel_id: src.cableId,
          source_core: src.num,
          target_kabel_id: tgt.cableId,
          target_core: tgt.num
        });
        traySplices.push({
          id: res.id,
          source_kabel_id: src.cableId, source_core: src.num,
          target_kabel_id: tgt.cableId, target_core: tgt.num
        });
        renderCores('source');
        renderCores('target');
      } catch (e) { toast(e.message, 'danger'); }
    }

    async function deleteSplice(e, spliceId) {
      e.stopPropagation();
      if (!confirm('Hapus sambungan ini?')) return;
      try {
        await api.delete(`/joint-closure/splices/${spliceId}`);
        traySplices = traySplices.filter(s => s.id !== spliceId);
        renderCores('source');
        renderCores('target');
      } catch (e) { toast(e.message, 'danger'); }
    }

    function drawSplices() {
      const svg = document.getElementById('splice-svg');
      const ws = document.getElementById('splice-workspace');
      const emptyState = document.querySelector('.visualizer-empty');
      
      if (!ws || !svg || ws.offsetParent === null) return;

      const rect = ws.getBoundingClientRect();
      if (rect.width === 0) return;

      svg.setAttribute('width', rect.width);
      svg.setAttribute('height', rect.height);
      svg.style.width = rect.width + 'px';
      svg.style.height = rect.height + 'px';
      svg.innerHTML = '';
      
      const sourceList = document.getElementById('list-source-cores');
      const targetList = document.getElementById('list-target-cores');
      const srcRect = sourceList.getBoundingClientRect();
      const tgtRect = targetList.getBoundingClientRect();

      let visibleCount = 0;

      traySplices.forEach(s => {
        // MATCHING: backend aliased source_core / target_core
        const srcEl = sourceList.querySelector(`[data-id="${s.source_core}"][data-cable="${s.source_kabel_id}"]`);
        const tgtEl = targetList.querySelector(`[data-id="${s.target_core}"][data-cable="${s.target_kabel_id}"]`);
        
        if (srcEl && tgtEl && srcEl.style.display !== 'none' && tgtEl.style.display !== 'none') {
          const sR = srcEl.getBoundingClientRect();
          const tR = tgtEl.getBoundingClientRect();
          
          // Visibility check within scrollable area (clipped by parent rect)
          if (sR.bottom < srcRect.top || sR.top > srcRect.bottom) return;
          if (tR.bottom < tgtRect.top || tR.top > tgtRect.bottom) return;

          visibleCount++;

          const x1 = sR.right - rect.left;
          const y1 = sR.top + (sR.height / 2) - rect.top;
          const x2 = tR.left - rect.left;
          const y2 = tR.top + (tR.height / 2) - rect.top;
          
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const cpX = x1 + (x2 - x1) / 2;
          path.setAttribute('d', `M ${x1} ${y1} C ${cpX} ${y1}, ${cpX} ${y2}, ${x2} ${y2}`);
          path.setAttribute('class', 'splice-line');
          svg.appendChild(path);
        }
      });

      if (emptyState) emptyState.style.opacity = visibleCount > 0 ? '0' : '0.15';
    }

    function filterCores(side, query) {
      const list = document.getElementById(`list-${side}-cores`);
      query = query.toLowerCase();
      list.querySelectorAll('.core-item').forEach(item => {
        const name = item.querySelector('.core-name').textContent.toLowerCase();
        const num = item.dataset.id;
        item.style.display = (name.includes(query) || num.includes(query)) ? 'flex' : 'none';
      });
      requestAnimationFrame(drawSplices);
    }

    let resizeObserver = null;
    function initResizeObserver() {
      if (resizeObserver) resizeObserver.disconnect();
      resizeObserver = new ResizeObserver(() => {
        requestAnimationFrame(drawSplices);
      });
      resizeObserver.observe(document.getElementById('splice-workspace'));
    }

    window.addEventListener('resize', drawSplices);

    function toast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${msg}</span>`;
      container.appendChild(t);
      setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    // Scroll listeners for real-time line sync
    document.getElementById('list-source-cores').addEventListener('scroll', drawSplices);
    document.getElementById('list-target-cores').addEventListener('scroll', drawSplices);

    loadJC();
  </script>
</body>
</html>
