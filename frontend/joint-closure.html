<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joint Closure - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0a0e1a' : '#f4f7fe');
    })();
  </script>
</head>
<body class="preloading">

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:white"><path d="M1 6l5.5 5.5L12 6l5.5 5.5L23 6"/><path d="M1 12l5.5 5.5L12 12l5.5 5.5L23 12"/></svg>
      </div>
      <div class="logo-text">
        <h1>CoreNMS</h1>
        <div>Unified Portal</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium); font-weight:800">Joint Closure Management</h2>
        <p style="font-size:12px; color:var(--text-muted)">Manage and monitor fiber optic joint closures</p>
      </div>
      <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>
          Tambah JC
        </button>
      </div>
    </header>

    <div class="page-body">
      <div id="jc-list" class="card" style="padding: 0; overflow: hidden;">
        <table>
          <thead>
            <tr>
              <th>Kode JC</th>
              <th>Lokasi</th>
              <th>Koordinat</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="jc-table-body">
            <tr><td colspan="5" style="text-align:center; padding:40px">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add JC -->
<div id="modal-jc" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Tambah Joint Closure</h3>
      <button class="btn-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="form-jc" onsubmit="saveJC(event)">
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Kode JC</label>
          <input type="text" id="jc-code" class="form-control" placeholder="Contoh: JC-TEBET-01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Lokasi / Alamat</label>
          <input type="text" id="jc-location" class="form-control" placeholder="Nama jalan atau patokan">
        </div>
        <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Latitude</label>
            <input type="text" id="jc-lat" class="form-control" placeholder="-6.12345">
          </div>
          <div class="form-group">
            <label class="form-label">Longitude</label>
            <input type="text" id="jc-lng" class="form-control" placeholder="106.12345">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Keterangan</label>
          <textarea id="jc-desc" class="form-control" style="height:80px"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary">Simpan JC</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('joint-closure.html');

  const modal = document.getElementById('modal-jc');
  const form = document.getElementById('form-jc');

  async function loadJCs() {
    const tbody = document.getElementById('jc-table-body');
    try {
      console.log('Fetching JCs...');
      const jcs = await api.get('/joint-closure');
      console.log('JCs received:', jcs);
      
      if (jcs.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:60px 20px; color:var(--text-muted)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="margin-bottom:16px; opacity:0.3"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <div style="font-weight:600; color:var(--text-primary)">Belum ada data JC</div>
          <p style="font-size:13px">Klik tombol "Tambah JC" untuk memulai</p>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = jcs.map(j => `
        <tr>
          <td style="font-weight:700; color:var(--accent)">${j.kode_jc}</td>
          <td>${j.lokasi || '-'}</td>
          <td style="font-size:12px; font-family:var(--font-premium)">${j.latitude || 0}, ${j.longitude || 0}</td>
          <td><span class="badge badge-success">${j.status_jc}</span></td>
          <td>
            <div style="display:flex; gap:8px">
              <button class="btn btn-ghost" style="padding:6px" onclick="location.href='jc-detail.html?id=${j.id}'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <button class="btn btn-ghost" style="padding:6px; color:var(--danger)" onclick="deleteJC(${j.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error('Fetch error:', err);
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--danger)">
        Error: ${err.message}. Pastikan server sudah direstart.
      </td></tr>`;
    }
  }

  function openModal() {
    form.reset();
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
  }

  async function saveJC(e) {
    e.preventDefault();
    const data = {
      kode_jc: document.getElementById('jc-code').value,
      lokasi: document.getElementById('jc-location').value,
      latitude: document.getElementById('jc-lat').value,
      longitude: document.getElementById('jc-lng').value,
      keterangan: document.getElementById('jc-desc').value
    };

    try {
      await api.post('/joint-closure', data);
      closeModal();
      loadJCs();
    } catch (err) {
      alert(err.message);
    }
  }

  async function deleteJC(id) {
    if (!confirm('Hapus JC ini? semua data tray dan splicing di dalamnya akan hilang.')) return;
    try {
      await api.delete(`/joint-closure/${id}`);
      loadJCs();
    } catch (err) {
      alert(err.message);
    }
  }

  loadJCs();
</script>
</body>
</html>
