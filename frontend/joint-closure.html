<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manajemen Joint Closure - CoreNMS">
  <title>Joint Closure - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0d0f18' : '#f8fafc');
    })();
  </script>
</head>
<body class="preloading">

<div class="toast-container" id="toast-container"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-text"><h1>CoreNMS</h1><div>Fiber Management</div></div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium);font-weight:800;font-size:20px">Joint Closure</h2>
        <p style="font-size:12px;color:var(--text-muted)">Infrastruktur & Titik Penyambungan Serat Optik</p>
      </div>
      <div class="page-header-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Cari Kode atau Lokasi..." onkeyup="filterData()">
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
          Tambah JC
        </button>
      </div>
    </header>

    <div class="page-body" style="padding:20px">
      
      <!-- Stats Overview -->
      <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:24px">
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(99,102,241,0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            </div>
            <div>
               <div id="stat-total" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Total JC</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(34,197,94,0.1); color:var(--success); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div>
               <div id="stat-active" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">JC Aktif</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(245,158,11,0.1); color:var(--warning); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div>
               <div id="stat-mt" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Maintenance</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:12px">
            <div style="width:36px; height:36px; border-radius:10px; background:rgba(99,102,241,0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div>
               <div id="stat-splices" style="font-size:18px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Total Core</div>
            </div>
         </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border-radius:14px">
        <div style="padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01)">
           <h4 style="font-size:13px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Daftar Infrastruktur</h4>
           <div style="display:flex; gap:8px">
              <button class="btn btn-ghost btn-sm" onclick="loadJCs()">Refresh</button>
           </div>
        </div>
        <div class="table-container">
          <table id="jc-table" style="width:100%">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>Kode JC</th>
                <th>Lokasi & Detail</th>
                <th style="text-align:center">Kabel</th>
                <th style="text-align:center">Tray</th>
                <th>Status</th>
                <th style="text-align:right">Aksi</th>
              </tr>
            </thead>
            <tbody id="jc-table-body">
              <tr><td colspan="7" style="text-align:center;padding:60px">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add/Edit JC -->
<div id="modal-jc" class="modal-overlay">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="modal-title">Joint Closure</h3>
      <button class="btn-close" onclick="closeModal()"></button>
    </div>
    <form id="form-jc" onsubmit="saveJC(event)">
      <div class="modal-body">
        <input type="hidden" id="jc-edit-id">
        <div class="form-group">
          <label class="form-label">Kode Joint Closure</label>
          <input type="text" id="jc-code" class="form-control" placeholder="Contoh: JC-PST-01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Lokasi / Alamat</label>
          <input type="text" id="jc-location" class="form-control" placeholder="Lokasi fisik JC">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Koordinat</label>
            <input type="text" id="jc-koordinat" class="form-control" placeholder="-6.xx, 107.xx">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="jc-status" class="form-control">
              <option value="active">Active</option>
              <option value="maintenance">Maintenance</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Keterangan</label>
          <textarea id="jc-desc" class="form-control" rows="2" placeholder="Catatan tambahan..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary" id="btn-save-jc">Simpan</button>
      </div>
    </form>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div id="modal-confirm" class="modal-overlay">
  <div class="modal" style="max-width:400px; text-align:center; padding:32px">
    <div class="modal-confirm-icon danger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="28" height="28"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
    <h4 style="font-size:18px; font-weight:800; margin-bottom:8px">Hapus Joint Closure?</h4>
    <p id="confirm-msg" style="font-size:13px; color:var(--text-muted); margin-bottom:24px; line-height:1.6"></p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
      <button class="btn btn-secondary" onclick="closeConfirm(false)">Batal</button>
      <button class="btn btn-danger" onclick="closeConfirm(true)">Hapus Data</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('joint-closure.html');

  let allJCs = [];
  let confirmCallback = null;

  async function loadJCs() {
    const tbody = document.getElementById('jc-table-body');
    try {
      allJCs = await api.get('/joint-closure');
      updateStats();
      
      if (!allJCs.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <h4>Belum ada Joint Closure</h4><p>Klik tombol "Tambah JC" untuk mendaftarkan infrastruktur baru.</p>
        </div></td></tr>`;
        return;
      }

      tbody.innerHTML = allJCs.map((j, i) => `
        <tr onclick="location.href='jc-detail.html?id=${j.id}'" style="cursor:pointer">
          <td style="color:var(--text-muted); font-size:11px">${i + 1}</td>
          <td>
            <div style="font-weight:800; color:var(--accent); font-size:14px">${j.kode_jc}</div>
            <div style="font-size:10px; color:var(--text-muted); font-family:monospace">${j.koordinat || 'Tanpa Koordinat'}</div>
          </td>
          <td>
            <div style="font-weight:600; font-size:13px">${j.lokasi || '-'}</div>
            <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase">${j.keterangan || ''}</div>
          </td>
          <td style="text-align:center">
             <span class="tag badge-secondary" style="background:rgba(99,102,241,0.05)">${j.cable_count || 0} Kabel</span>
          </td>
          <td style="text-align:center">
             <span class="tag badge-secondary" style="background:rgba(99,102,241,0.05)">${j.tray_count || 0} Tray</span>
          </td>
          <td><span class="tag badge-${j.status_jc === 'active' ? 'success' : j.status_jc === 'maintenance' ? 'warning' : 'danger'}">${j.status_jc}</span></td>
          <td style="text-align:right">
            <div style="display:flex; justify-content:flex-end; gap:6px" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="editJC(${j.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteJC(${j.id},'${j.kode_jc}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--danger)">Gagal memuat data: ${err.message}</td></tr>`;
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allJCs.length;
    document.getElementById('stat-active').textContent = allJCs.filter(j => j.status_jc === 'active').length;
    document.getElementById('stat-mt').textContent = allJCs.filter(j => j.status_jc === 'maintenance').length;
    // Approximate cores if cable_count is available (actually should fetch from API for real accuracy)
    const cores = allJCs.reduce((s, j) => s + (j.cable_count || 0) * 12, 0); 
    document.getElementById('stat-splices').textContent = cores + '+';
  }

  function filterData() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const rows = document.querySelectorAll('#jc-table-body tr');
    rows.forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  function openModal() {
    document.getElementById('modal-title').textContent = 'Tambah Joint Closure';
    document.getElementById('form-jc').reset();
    document.getElementById('jc-edit-id').value = '';
    document.getElementById('modal-jc').style.display = 'flex';
  }

  function editJC(id) {
    const jc = allJCs.find(j => j.id === id);
    if (!jc) return;
    document.getElementById('modal-title').textContent = 'Edit Joint Closure';
    document.getElementById('jc-edit-id').value = id;
    document.getElementById('jc-code').value = jc.kode_jc;
    document.getElementById('jc-location').value = jc.lokasi || '';
    document.getElementById('jc-koordinat').value = jc.koordinat || '';
    document.getElementById('jc-status').value = jc.status_jc || 'active';
    document.getElementById('jc-desc').value = jc.keterangan || '';
    document.getElementById('modal-jc').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-jc').style.display = 'none'; }

  async function saveJC(e) {
    e.preventDefault();
    const idEdit = document.getElementById('jc-edit-id').value;
    const btn = document.getElementById('btn-save-jc');
    btn.disabled = true;
    
    const data = {
      kode_jc: document.getElementById('jc-code').value.trim(),
      lokasi: document.getElementById('jc-location').value,
      koordinat: document.getElementById('jc-koordinat').value,
      status_jc: document.getElementById('jc-status').value,
      keterangan: document.getElementById('jc-desc').value
    };

    try {
      if (idEdit) await api.put(`/joint-closure/${idEdit}`, data);
      else await api.post('/joint-closure', data);
      
      toast(idEdit ? 'Data diperbarui' : 'Data ditambahkan');
      closeModal();
      loadJCs();
    } catch (e) { toast(e.message, 'danger'); }
    finally { btn.disabled = false; }
  }

  function deleteJC(id, kode) {
    document.getElementById('confirm-msg').textContent = `Hapus JC "${kode}"? Semua data di dalamnya akan dihapus permanen.`;
    document.getElementById('modal-confirm').style.display = 'flex';
    confirmCallback = async (ok) => {
      if (ok) {
        try {
          await api.delete(`/joint-closure/${id}`);
          toast('Data dihapus', 'danger');
          loadJCs();
        } catch (e) { toast(e.message, 'danger'); }
      }
    };
  }

  function closeConfirm(res) {
    document.getElementById('modal-confirm').style.display = 'none';
    if (confirmCallback) confirmCallback(res);
  }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  loadJCs();
</script>
</body>
</html>
