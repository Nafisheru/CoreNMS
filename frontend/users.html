<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0a0e1a' : '#f4f7fe');
    })();
  </script>
</head>
<body class="preloading">

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" style="width:22px; height:22px; fill:white"><path d="M1 6l5.5 5.5L12 6l5.5 5.5L23 6"/><path d="M1 12l5.5 5.5L12 12l5.5 5.5L23 12"/></svg>
      </div>
      <div class="logo-text">
        <h1>CoreNMS</h1>
        <div>Unified Portal</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium); font-weight:800">User Management</h2>
        <p style="font-size:12px; color:var(--text-muted)">Manage system access and roles</p>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah User
        </button>
      </div>
    </header>

    <div class="page-body">
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>User</th>
                <th>Role</th>
                <th>WhatsApp</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <!-- Content loaded via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add/Edit -->
<div class="modal-overlay" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Tambah User Baru</h3>
      <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:var(--text-muted)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="user-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="full_name" class="form-control" placeholder="Nama lengkap">
        </div>
        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="role" class="form-control" required>
              <option value="admin">Admin</option>
              <option value="noc">Staff/NOC</option>
              <option value="technician">Technician</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Kosongkan jika tidak ingin diubah">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp Number</label>
          <input type="text" id="whatsapp" class="form-control" placeholder="Contoh: 62812345678">
        </div>
        <div class="form-group" id="status-group" style="display:none">
          <label class="form-label">Status</label>
          <select id="status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:var(--bg-card-hover)" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveUser()">Simpan Perubahan</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('users.html');
  let users = [];

  async function loadUsers() {
    try {
      users = await api.get('/users');
      const tbody = document.getElementById('user-table-body');
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>
            <div style="font-weight:700">${u.full_name || u.username}</div>
            <div style="font-size:11px; color:var(--text-muted)">@${u.username}</div>
          </td>
          <td style="text-transform:capitalize">${u.role}</td>
          <td>${u.whatsapp || '-'}</td>
          <td><span class="badge badge-${u.status === 'active' ? 'success' : 'danger'}">${u.status}</span></td>
          <td>
            <button class="btn" style="padding:6px; background:var(--bg-card-hover)" onclick="openEditModal(${u.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      alert(err.message);
    }
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Tambah User Baru';
    document.getElementById('edit-id').value = '';
    document.getElementById('user-form').reset();
    document.getElementById('status-group').style.display = 'none';
    document.getElementById('username').disabled = false;
    document.getElementById('password').placeholder = 'Masukkan password';
    document.getElementById('password').required = true;
    document.getElementById('modal-user').style.display = 'flex';
  }

  function openEditModal(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    
    document.getElementById('modal-title').textContent = 'Edit User';
    document.getElementById('edit-id').value = u.id;
    document.getElementById('full_name').value = u.full_name || '';
    document.getElementById('username').value = u.username;
    document.getElementById('role').value = u.role;
    document.getElementById('whatsapp').value = u.whatsapp || '';
    document.getElementById('status').value = u.status;
    document.getElementById('status-group').style.display = 'block';
    document.getElementById('username').disabled = true;
    document.getElementById('password').placeholder = 'Kosongkan jika tidak ingin diubah';
    document.getElementById('password').required = false;
    document.getElementById('password').value = '';
    document.getElementById('modal-user').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-user').style.display = 'none';
  }

  async function saveUser() {
    const id = document.getElementById('edit-id').value;
    const data = {
      username: document.getElementById('username').value.trim(),
      full_name: document.getElementById('full_name').value.trim(),
      role: document.getElementById('role').value,
      whatsapp: document.getElementById('whatsapp').value.trim(),
    };
    
    const pass = document.getElementById('password').value;
    if (pass) data.password = pass;
    if (id) data.status = document.getElementById('status').value;

    try {
      if (id) {
        await api.put(`/users/${id}`, data);
      } else {
        await api.post('/users', data);
      }
      closeModal();
      loadUsers();
    } catch (err) {
      alert(err.message);
    }
  }

  loadUsers();
</script>
</body>
</html>
