<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Management - CoreNMS">
  <title>User Management - CoreNMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('core_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.style.background = (t === 'dark' ? '#0d0f18' : '#f8fafc');
    })();
  </script>
</head>
<body class="preloading">

<div class="toast-container" id="toast-container"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="20" height="20"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-text"><h1>CoreNMS</h1><div>Fiber Management</div></div>
    </div>
    <nav id="sidebar-nav" class="sidebar-nav"></nav>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 style="font-family:var(--font-premium);font-weight:800;font-size:20px">Pengguna Sistem</h2>
        <p style="font-size:12px;color:var(--text-muted)">Kelola Akun, Peran, dan Hak Akses</p>
      </div>
      <div class="page-header-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Cari nama atau username..." onkeyup="filterTable()">
        </div>
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah User
        </button>
      </div>
    </header>

    <div class="page-body" style="padding:20px">
      
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:24px">
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:14px">
            <div style="width:40px; height:40px; border-radius:12px; background:rgba(99,102,241,0.1); color:var(--accent); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div>
               <div id="stat-total-users" style="font-size:20px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Total Pengguna</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:14px">
            <div style="width:40px; height:40px; border-radius:12px; background:rgba(34,197,94,0.1); color:var(--success); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
            </div>
            <div>
               <div id="stat-active-users" style="font-size:20px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Akun Aktif</div>
            </div>
         </div>
         <div class="card" style="padding:16px; display:flex; align-items:center; gap:14px">
            <div style="width:40px; height:40px; border-radius:12px; background:rgba(239,68,68,0.1); color:var(--danger); display:flex; align-items:center; justify-content:center">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div>
               <div id="stat-admins" style="font-size:20px; font-weight:800; line-height:1">0</div>
               <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; font-weight:700">Administrator</div>
            </div>
         </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border-radius:14px">
        <div style="padding:16px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01)">
           <h4 style="font-size:13px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Daftar Pengguna</h4>
           <button class="btn btn-ghost btn-sm" onclick="loadUsers()">Refresh</button>
        </div>
        <div class="table-container">
          <table id="user-table" style="width:100%">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>Profil Pengguna</th>
                <th>Peran / Akses</th>
                <th>WhatsApp</th>
                <th style="text-align:center">Status</th>
                <th style="text-align:right">Aksi</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr><td colspan="6" style="text-align:center;padding:60px">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Add/Edit User -->
<div class="modal-overlay" id="modal-user">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3 id="modal-title">Form Pengguna</h3>
      <button class="btn-close" onclick="closeModal()"></button>
    </div>
    <div class="modal-body">
      <form id="user-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="full_name" class="form-control" placeholder="Contoh: Budi Santoso">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Username unik" required autocomplete="off">
          </div>
          <div class="form-group">
            <label class="form-label">Peran Sistem</label>
            <select id="role" class="form-control" required>
              <option value="admin">Administrator</option>
              <option value="noc">Staff NOC</option>
              <option value="technician">Technician</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min. 6 Karakter" autocomplete="new-password">
          <p id="pass-hint" style="font-size:10px; color:var(--text-muted); margin-top:4px"></p>
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp</label>
          <input type="text" id="whatsapp" class="form-control" placeholder="62812xxxxxx">
        </div>
        <div class="form-group" id="status-group" style="display:none; margin-bottom:0">
          <label class="form-label">Status Akun</label>
          <select id="status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveUser()">Simpan Akun</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div id="modal-confirm" class="modal-overlay">
  <div class="modal" style="max-width:400px; text-align:center; padding:32px">
    <div class="modal-confirm-icon danger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="28" height="28"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </div>
    <h4 style="font-size:18px; font-weight:800; margin-bottom:8px">Hapus Akun?</h4>
    <p id="confirm-msg" style="font-size:13px; color:var(--text-muted); margin-bottom:24px; line-height:1.6"></p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
      <button class="btn btn-secondary" onclick="closeConfirm(false)">Batal</button>
      <button class="btn btn-danger" onclick="closeConfirm(true)">Hapus</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
  renderNav('users.html');
  let users = [];
  let confirmCallback = null;
  const me = api.getUser();

  async function loadUsers() {
    try {
      users = await api.get('/users');
      updateStats();
      const tbody = document.getElementById('user-table-body');
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><h4>Belum ada user</h4></div></td></tr>`;
        return;
      }
      tbody.innerHTML = users.map((u, i) => `
        <tr>
          <td style="color:var(--text-muted); font-size:11px">${i + 1}</td>
          <td>
            <div style="display:flex; align-items:center; gap:12px">
              <div style="width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--accent), var(--accent-dark)); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:white; text-shadow:0 1px 2px rgba(0,0,0,0.2)">
                ${(u.full_name || u.username)[0].toUpperCase()}
              </div>
              <div>
                <div style="font-weight:800; color:var(--text-primary); font-size:14px">${u.full_name || u.username}</div>
                <div style="font-size:10px; color:var(--text-muted); font-family:monospace">@${u.username}</div>
              </div>
            </div>
          </td>
          <td><span class="tag badge-${u.role === 'admin' ? 'danger' : u.role === 'noc' ? 'info' : 'success'}">${u.role.toUpperCase()}</span></td>
          <td>${u.whatsapp ? `<a href="https://wa.me/${u.whatsapp}" target="_blank" style="color:var(--success); font-weight:700; font-size:13px">${u.whatsapp}</a>` : '<span style="color:var(--text-muted)">-</span>'}</td>
          <td style="text-align:center"><span class="tag ${u.status === 'active' ? 'badge-success' : 'badge-danger'}">${u.status}</span></td>
          <td style="text-align:right">
            <div style="display:flex; justify-content:flex-end; gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="openEditModal(${u.id})">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              ${me && u.id !== me.id ? `
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteUser(${u.id},'${u.username}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) { toast(err.message, 'danger'); }
  }

  function updateStats() {
    document.getElementById('stat-total-users').textContent = users.length;
    document.getElementById('stat-active-users').textContent = users.filter(u => u.status === 'active').length;
    document.getElementById('stat-admins').textContent = users.filter(u => u.role === 'admin').length;
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('#user-table-body tr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Tambah User Baru';
    document.getElementById('edit-id').value = '';
    document.getElementById('user-form').reset();
    document.getElementById('status-group').style.display = 'none';
    document.getElementById('username').disabled = false;
    document.getElementById('pass-hint').textContent = 'Password wajib diisi (Min. 6 Karakter)';
    document.getElementById('modal-user').style.display = 'flex';
  }

  function openEditModal(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    document.getElementById('modal-title').textContent = 'Edit Profil Pengguna';
    document.getElementById('edit-id').value = u.id;
    document.getElementById('full_name').value = u.full_name || '';
    document.getElementById('username').value = u.username;
    document.getElementById('role').value = u.role;
    document.getElementById('whatsapp').value = u.whatsapp || '';
    document.getElementById('status').value = u.status;
    document.getElementById('status-group').style.display = 'block';
    document.getElementById('username').disabled = true;
    document.getElementById('pass-hint').textContent = 'Biarkan kosong jika tidak ingin mengubah password';
    document.getElementById('modal-user').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal-user').style.display = 'none'; }

  async function saveUser() {
    const id = document.getElementById('edit-id').value;
    const pass = document.getElementById('password').value;
    if (!id && !pass) return toast('Password wajib diisi untuk user baru', 'danger');
    if (pass && pass.length < 6) return toast('Password minimal 6 karakter', 'danger');

    const data = {
      username: document.getElementById('username').value.trim(),
      full_name: document.getElementById('full_name').value.trim(),
      role: document.getElementById('role').value,
      whatsapp: document.getElementById('whatsapp').value.trim(),
    };
    if (pass) data.password = pass;
    if (id) data.status = document.getElementById('status').value;

    try {
      if (id) await api.put(`/users/${id}`, data);
      else await api.post('/users', data);
      toast(id ? 'User diperbarui' : 'User ditambahkan');
      closeModal();
      loadUsers();
    } catch (err) { toast(err.message, 'danger'); }
  }

  function deleteUser(id, username) {
    document.getElementById('confirm-msg').textContent = `Hapus user "@${username}"? Akses user ini akan segera dicabut secara permanen.`;
    document.getElementById('modal-confirm').style.display = 'flex';
    confirmCallback = async (ok) => {
      if (ok) {
        try {
          await api.delete(`/users/${id}`);
          toast('User dihapus', 'danger');
          loadUsers();
        } catch (err) { toast(err.message, 'danger'); }
      }
    };
  }

  function closeConfirm(res) {
    document.getElementById('modal-confirm').style.display = 'none';
    if (confirmCallback) confirmCallback(res);
  }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  loadUsers();
</script>
</body>
</html>
